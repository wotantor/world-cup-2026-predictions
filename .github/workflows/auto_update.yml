name: Auto Update Leaderboard and Backup

on:
  schedule:
    # Запуск каждый день в 06:00 по МСК (03:00 по UTC)
    - cron: '0 3 * * *'
  workflow_dispatch: # Позволяет запускать обновление вручную кнопкой

jobs:
  update-and-backup:
    runs-on: ubuntu-latest
    steps:
    - name: Проверка кода
      uses: actions/checkout@v4

    - name: Настройка Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Запуск скрипта обновления
      run: python update_leaderboard.py

    - name: Создание резервной копии Excel (Бэкап)
      run: |
        ID=$(python -c "import update_leaderboard; print(update_leaderboard.SPREADSHEET_ID)")
        curl -L "https://google.com" -o "backup_world_cup_2026.xlsx"

    - name: Сохранение изменений в README и бэкапа
      run: |
        git config --global user.name 'GitHub Action Bot'
        git config --global user.email 'actions@github.com'
        git add README.md backup_world_cup_2026.xlsx
        git commit -m "Авто-обновление и создание бэкапа таблицы" || echo "Нет изменений"
        git push
